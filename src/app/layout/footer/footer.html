<footer class="site-footer">
  <div class="site-footer__container">
    <div class="footer-brand">
      <div class="footer-brand__logo">CM</div>
      <div>
        <strong>Clayton Marriel</strong>
        <span>{{ 'footer.role' | t }}</span>
      </div>
    </div>

    <div class="footer-links">
      <a href="#about">{{ 'footer.about' | t }}</a>
      <a href="#experience">{{ 'footer.experience' | t }}</a>
      <a href="#projects">{{ 'footer.projects' | t }}</a>
      <a href="#stack">{{ 'footer.stack' | t }}</a>
      <a href="#contact">{{ 'footer.contact' | t }}</a>
    </div>

    <div class="footer-meta">
      <p>© {{ currentYear }} Clayton Marriel. {{ 'footer.rights' | t }}</p>
      <!-- <p>{{ 'footer.builtWith' | t }}</p> -->
    </div>
  </div>
