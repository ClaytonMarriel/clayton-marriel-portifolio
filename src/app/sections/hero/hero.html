<section id="home" class="hero-section relative overflow-hidden text-white">
  <div class="pointer-events-none absolute inset-0">
    <div class="hero-orb hero-orb-1"></div>
    <div class="hero-orb hero-orb-2"></div>
    <div class="hero-orb hero-orb-3"></div>
    <div class="hero-grid"></div>
  </div>

  <div class="relative z-10 mx-auto max-w-7xl px-6 pb-20 pt-6 lg:px-8">
    <div class="grid items-center gap-12 lg:grid-cols-[0.9fr_1.1fr]">
      <div class="pb-8 lg:pb-20">
        <h1 class="max-w-2xl text-5xl font-extrabold leading-[0.95] sm:text-6xl lg:text-7xl">
          {{ 'hero.greeting' | t }}
          <span class="mt-2 block">Clayton Marriel</span>
        </h1>

        <h2 class="mt-4 text-2xl font-semibold text-white/90 sm:text-3xl">
          {{ 'hero.role' | t }}
        </h2>

        <div class="mt-6 h-px w-48 bg-white/15"></div>

        <p class="mt-6 max-w-xl text-lg leading-8 text-white/72">
          {{ 'hero.description' | t }}
        </p>

        <div class="mt-10">
          <a
            href="#projects"
            class="hero-button hero-button-primary inline-flex items-center justify-center rounded-full px-8 py-4 text-base font-semibold"
          >
            {{ 'hero.cta' | t }}
          </a>
        </div>
      </div>

      <div class="relative flex items-center justify-center lg:justify-end">
        <div class="hero-visual relative w-full max-w-[760px]">
          <div class="hero-visual-glow"></div>

          <div class="hero-image-shell">
            <div class="hero-image-bg"></div>

            <img
              src="/assets/images/profile_cartoon.png"
              [alt]="'hero.imageAlt' | t"
              class="hero-main-image relative z-10 w-full"
            />

            <div class="hero-floating hero-floating-left">
              <div class="h-2 w-16 rounded-full bg-pink-400/80"></div>
              <div class="mt-2 h-2 w-24 rounded-full bg-blue-300/70"></div>
            </div>

            <div class="hero-floating hero-floating-right-top">
              <div class="flex gap-2">
                <span class="h-3 w-3 rounded-full bg-pink-400"></span>
                <span class="h-3 w-3 rounded-full bg-violet-400"></span>
                <span class="h-3 w-3 rounded-full bg-blue-400"></span>
              </div>
            </div>

            <div class="hero-floating hero-floating-right-bottom">
              <div class="flex items-center gap-3">
                <span class="flex h-10 w-10 items-center justify-center rounded-xl bg-white/10 text-xl">
                  &lt;/&gt;
                </span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="relative z-10 mt-2 pb-8 lg:-mt-8 lg:pb-12">
      <div class="about-banner mx-auto flex max-w-6xl items-center justify-between gap-6 rounded-[30px] px-6 py-6">
        <div class="flex items-center gap-5">
          <img
            src="/assets/images/profile_cartoon.png"
            [alt]="'hero.profileAlt' | t"
            class="h-24 w-24 rounded-full object-cover ring-2 ring-white/10"
          />

          <div>
            <h3 class="text-3xl font-bold text-white">{{ 'hero.bannerTitle' | t }}</h3>
            <p class="mt-2 text-base text-white/75">
              {{ 'hero.bannerDescription' | t }}
            </p>
          </div>
        </div>

        <a
          href="#about"
          class="hero-button hero-button-primary hidden rounded-full px-8 py-4 text-base font-semibold md:inline-flex"
        >
          {{ 'hero.bannerCta' | t }}
        </a>
      </div>
    </div>
  </div>
</section>
